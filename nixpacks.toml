# nixpacks.toml — adds system libraries needed by cadquery / OCP / VTK
# so that the Python `import cadquery` actually succeeds at runtime.
# Without these, OCP fails to load OpenGL / X11 / fontconfig deps and
# the ARIA-OS pipeline falls back to LLM-only generation that can't
# validate geometry.

[phases.setup]
aptPkgs = [
  "libgl1",
  "libglib2.0-0",
  "libxrender1",
  "libxi6",
  "libxext6",
  "libsm6",
  "libfontconfig1",
  "libgomp1",
  "libxkbcommon0",
]
